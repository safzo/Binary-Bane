<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Studies | SAFZO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav></nav>
    <div class="mobile-menu" id="mobileMenu"></div>

    <div class="grid">
        <div class="card" onclick="openModal('case1')">
            <img src="https://images.unsplash.com/photo-1586769852836-bc069f19e1b6?q=80&w=1000&auto=format&fit=crop" class="card-img">
            <div class="card-body">
                <h3>Logistics ROI</h3>
                <p>Click to view full technical teardown →</p>
            </div>
        </div>
    </div>

    <div id="case1" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('case1')">&times;</span>
            <h2>Technical Teardown: Logistics ROI</h2>
            <hr style="border: 0.5px solid var(--accent-orange); margin: 1rem 0;">
            <p><strong>Situation:</strong> Detailed explanation of the $200k loss...</p>
            <p><strong>Action:</strong> Bayesian engine deployment...</p>
            <p><strong>Result:</strong> $40k monthly overhead reduction.</p>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        window.onclick = function(e) { if(e.target.className === 'modal') e.target.style.display = 'none'; }
    </script>
</body>
</html>
