<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Studies | SAFZO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SAFZO<span>.</span></a>
        <div class="search-wrapper"><input type="text" class="search-bar" id="caseSearch" onkeyup="filterCards()" placeholder="Search cases..."></div>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="cases.html" style="color:var(--accent-orange)">Case Studies</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="inquiry.html">Inquiry</a></li>
        </ul>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
    </nav>

    <div class="grid" id="cardGrid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1586769852836-bc069f19e1b6" class="card-img">
            <div class="card-body"><h3>Logistics ROI</h3><p>Predictive routing model for $40k/mo savings.</p></div>
        </div>
        </div>

    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }
        function filterCards() {
            let input = document.getElementById('caseSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
