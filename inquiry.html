<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | SAFZO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container Layout */
        .form-wrapper { 
            padding-top: 140px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding-bottom: 60px;
            padding-left: 5%;
            padding-right: 5%;
        }

        /* The "Hover Box" Appearance */
        .form-container { 
            width: 100%;
            max-width: 550px; 
            background: var(--card-blue); 
            padding: 3.5rem; 
            border-radius: 15px; 
            border-left: 6px solid var(--accent-orange); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); 
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            .form-container { padding: 2rem; }
            .form-wrapper { padding-top: 100px; }
        }

        h2 { margin-bottom: 0.5rem; color: var(--text-beige); }
        .subtitle { color: var(--accent-orange); font-weight: 600; margin-bottom: 2rem; display: block; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { 
            width: 100%; 
            padding: 1.1rem; 
            background: var(--bg-black); 
            border: 1px solid rgba(242, 230, 218, 0.1); 
            color: white; 
            margin-bottom: 1.2rem; 
            border-radius: 6px; 
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        /* Loading State for Button */
        .cta-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        .logic-quote {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(242, 230, 218, 0.1);
            font-style: italic;
            font-size: 0.85rem;
            color: rgba(242, 230, 218, 0.6);
        }

        .logic-quote span { color: var(--accent-orange); font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SAFZO<span>.</span></a>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search strategy...">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="cases.html">Case Studies</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="inquiry.html" style="color:var(--accent-orange)">Inquiry</a></li>
        </ul>
        <div class="mobile-controls">
            <button class="hamburger" onclick="toggleMenu()">☰</button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <span class="close-menu" onclick="toggleMenu()">&times;</span>
        <a href="index.html" onclick="toggleMenu()">About</a>
        <a href="cases.html" onclick="toggleMenu()">Case Studies</a>
        <a href="blog.html" onclick="toggleMenu()">Blog</a>
        <a href="inquiry.html" onclick="toggleMenu()">Inquiry</a>
    </div>

    <div class="form-wrapper">
        <div class="form-container">
            <h2>Impact Assessment</h2>
            <span class="subtitle">Quantifying the ROI of optimization.</span>
            
            <form id="inquiry-form">
                <input type="text" id="company" placeholder="Company / Industry" required>
                <input type="number" id="loss" placeholder="Estimated Annual Loss ($)" required>
                <textarea id="description" rows="4" placeholder="Describe the current operational friction..." required></textarea>
                <button type="submit" class="cta-btn" id="submitBtn">Submit for Review</button>
            </form>
            
            <div class="logic-quote">
                "Since this issue is costing you $200k, my fee to build a predictive model isn't an 'expense'—it’s an <span>investment that pays for itself in 40 days.</span>"
            </div>
        </div>
    </div>

    <script>
        // Toggle Mobile Menu
        function toggleMenu() { 
            document.getElementById('mobileMenu').classList.toggle('active'); 
        }

        // --- GOOGLE SHEETS SECURE SUBMISSION ---
        // Replace the URL below with your Google Apps Script Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycby9Z-ueJECVPZFYLm91rg9fB_nRsRqoc_l5iwUON2IRGxQf0GCx82oqQD_nxh__V-rdWw/exec';
        const form = document.getElementById('inquiry-form');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // UI Visual Feedback
            btn.innerHTML = "Submitting Data...";
            btn.disabled = true;

            // Prepare Data Object
            const formData = {
                company: document.getElementById('company').value,
                loss: document.getElementById('loss').value,
                description: document.getElementById('description').value
            };

            // Secure POST to Google Script
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', // Essential for Google Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert("Assessment Submitted Successfully. I will review the financial logic and reach out.");
                form.reset();
                btn.innerHTML = "Submit for Review";
                btn.disabled = false;
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("There was a connection error. Please try again.");
                btn.innerHTML = "Submit for Review";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
