<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | SAFZO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SAFZO<span>.</span></a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="cases.html">Case Studies</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="inquiry.html" style="color:var(--accent-orange)">Inquiry</a></li>
        </ul>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
    </nav>

    <div class="form-card">
        <h2 style="margin-bottom:1.5rem;">Impact Assessment</h2>
        <form id="inquiry-form">
            <input type="text" id="company" placeholder="Company / Industry" required>
            <input type="number" id="loss" placeholder="Estimated Annual Loss ($)" required>
            <textarea id="description" rows="4" placeholder="Current Operational Friction..." required></textarea>
            <button type="submit" class="cta-btn" id="submitBtn">Submit Assessment</button>
        </form>
    </div>

    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbz325wlujMJ6sd30asumC_whIaiH8L6tPXLgtiWt8DwNHrjbT-5bpa5tQrE337fUb6yOA/exec'; // <--- URL HERE
        const form = document.getElementById('inquiry-form');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.innerHTML = "Submitting...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('company', document.getElementById('company').value);
            formData.append('loss', document.getElementById('loss').value);
            formData.append('description', document.getElementById('description').value);

            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                alert("Success! Assessment recorded.");
                form.reset();
                btn.innerHTML = "Submit Assessment";
                btn.disabled = false;
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Submission error. Please check your script URL.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
