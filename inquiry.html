    <div class="form-card">
        <h2>Impact Assessment</h2>
        <p style="margin-bottom:2rem; opacity:0.7;">Submit your operational constraints for a strategic audit.</p>
        <form id="inquiry-form">
            <input type="text" id="company" placeholder="Company / Industry" required>
            <input type="number" id="loss" placeholder="Annual Estimated Loss ($)" required>
            <textarea id="description" rows="5" placeholder="Describe the current friction..." required></textarea>
            <button type="submit" class="cta-btn" id="submitBtn">Submit Assessment</button>
        </form>
    </div>
