<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inquiry | SAFZO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SAFZO<span>.</span></a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="cases.html">Case Studies</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="inquiry.html" style="color:var(--accent-orange)">Inquiry</a></li>
        </ul>
    </nav>
    <div style="padding-top:140px; display:flex; justify-content:center;">
        <div class="content-box" style="width:100%; max-width:550px;">
            <h2>Impact Assessment</h2><br>
            <form id="inquiry-form">
                <input type="text" id="company" placeholder="Company" style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;" required>
                <input type="number" id="loss" placeholder="Loss ($)" style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;" required>
                <textarea id="description" rows="4" placeholder="Friction..." style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;" required></textarea>
                <button type="submit" class="cta-btn" id="submitBtn" style="width:100%;">Submit</button>
            </form>
        </div>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz325wlujMJ6sd30asumC_whIaiH8L6tPXLgtiWt8DwNHrjbT-5bpa5tQrE337fUb6yOA/exec';
        const form = document.getElementById('inquiry-form');
        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            const formData = new FormData();
            formData.append('company', document.getElementById('company').value);
            formData.append('loss', document.getElementById('loss').value);
            formData.append('description', document.getElementById('description').value);
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => { alert("Success! Recorded."); form.reset(); document.getElementById('submitBtn').disabled = false; });
        });
    </script>
</body>
</html>
