    <nav>
        <a href="index.html" class="logo">SAFZO<span>.</span></a>

        <ul class="nav-links">

        <div class="form-container">
            <h2>Impact Assessment</h2>
            <p style="margin-bottom:1.5rem">Determine the ROI of a data-driven solution.</p>
            <form id="contact-form">
                <input type="text" placeholder="Company Name" style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;">
                <input type="number" placeholder="Estimated Annual Loss ($)" style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;">
                <textarea placeholder="Describe the friction..." style="width:100%; padding:1rem; margin-bottom:1rem; background:#16181d; color:white; border:1px solid #333;" rows="5"></textarea>
                <button type="submit" class="cta-btn">Submit for Review</button>
            </form>
            <p style="margin-top:2rem; font-style:italic; font-size:0.9rem; color:var(--accent-orange)">"If an issue costs you $200k/year, a $20k model is a 900% ROI."</p>
        </div>
    </div>
