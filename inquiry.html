<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | SAFZO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-wrapper { padding: 120px 5%; display: flex; justify-content: center; }
        .form-container { width: 100%; max-width: 500px; background: var(--card-blue); padding: 2.5rem; border-radius: 12px; border-left: 5px solid var(--accent-orange); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 1rem; margin-bottom: 1rem; background: var(--bg-black); border: 1px solid #333; color: white; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="form-wrapper">
        <div class="form-container">
            <h2>Impact Assessment</h2>
            <form>
                <input type="text" placeholder="Company Name">
                <input type="number" placeholder="Annual Loss ($)">
                <textarea rows="5" placeholder="Problem Description..."></textarea>
                <button class="cta-btn">Submit for Review</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('active'); }
    </script>
</body>
</html>
